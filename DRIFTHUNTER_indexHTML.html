
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Google Docs</title>

<style>
body {
margin: 0;
background: #111;
font-family: Arial, sans-serif;
color: white;
}

.top-bar {
padding: 10px;
background: #000;
display: flex;
justify-content: space-between;
flex-wrap: wrap;
}

button {
margin: 2px;
padding: 6px 12px;
border: none;
border-radius: 5px;
cursor: pointer;
}

.green { background: #28a745; color: white; }
.blue { background: #007bff; color: white; }
.orange { background: #ff9800; color: white; }
.red { background: #dc3545; color: white; }

.game-container {
width: 100%;
height: calc(100vh - 60px);
}

iframe {
width: 100%;
height: 100%;
border: none;
}
</style>
</head>

<body>

<div class="top-bar">
<div>📄 Google Docs</div>
<div>
<button class="green" onclick="goFullscreen()">Fullscreen</button>
<button class="blue" onclick="saveGame()">Save</button>
<button class="orange" onclick="loadGame()">Upload</button>
<button class="red" onclick="panic()">Panic</button>
<input type="file" id="fileInput" hidden>
</div>
</div>

<div class="game-container" id="gameContainer">
<iframe src="https://htmlxm.github.io/h/drift-hunters"></iframe>
</div>

<script>
/* FULLSCREEN */
function goFullscreen() {
let elem = document.getElementById("gameContainer");
if (elem.requestFullscreen) elem.requestFullscreen();
}

/* CLEAN SAVE (filters likely game keys) */
function getGameData() {
let data = {};
for (let i = 0; i < localStorage.length; i++) {
let key = localStorage.key(i);

// Try to filter game-related keys
if (key.toLowerCase().includes("drift") || key.toLowerCase().includes("unity")) {
data[key] = localStorage.getItem(key);
}
}
return data;
}

/* SAVE FILE */
function saveGame() {
let data = getGameData();
let blob = new Blob([JSON.stringify(data)], { type: "application/json" });

let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "drift-save.json";
a.click();
}

/* LOAD FILE */
function loadGame() {
document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", function(e) {
let file = e.target.files[0];
let reader = new FileReader();

reader.onload = function() {
let data = JSON.parse(reader.result);

for (let key in data) {
localStorage.setItem(key, data[key]);
}

alert("Save loaded! Reloading...");
location.reload();
};

reader.readAsText(file);
});

/* AUTO SAVE (every 10 seconds) */
setInterval(() => {
let data = getGameData();
localStorage.setItem("autoSave_drift", JSON.stringify(data));
}, 10000);

/* LOAD AUTO SAVE ON START */
window.onload = () => {
let auto = localStorage.getItem("autoSave_drift");
if (auto) {
let data = JSON.parse(auto);
for (let key in data) {
localStorage.setItem(key, data[key]);
}
}
};

/* TAB CLOAK */
document.title = "Google Docs";
let link = document.createElement('link');
link.rel = 'icon';
link.href = "https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico";
document.head.appendChild(link);

/* PANIC BUTTON (press ESC or click button) */
function panic() {
window.location.href = "https://www.google.com";
}

document.addEventListener("keydown", function(e) {
if (e.key === "Escape") {
panic();
}
});
</script>

</body>
</html>
